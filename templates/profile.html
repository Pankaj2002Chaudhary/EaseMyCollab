{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.7);
    --glass-border: rgba(229, 224, 216, 0.8);
    --accent-dark: #1a1a1a;
    --soft-gold: #c9a96e;
  }

  .profile-wrapper {
    padding: 100px 20px;
    background: radial-gradient(circle at top right, #fdfbf9, #fcfaf7);
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .profile-hero {
    max-width: 900px;
    margin: 0 auto 40px;
    text-align: center;
    position: relative;
  }

  .avatar-stack {
    position: relative;
    width: 110px;
    height: 110px;
    margin: 0 auto 25px;
  }

  .avatar-main {
    width: 100%;
    height: 100%;
    background: var(--accent-dark);
    border-radius: 35% 65% 70% 30% / 30% 40% 60% 70%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: #fff;
    font-family: 'Playfair Display', serif;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    transition: 0.5s ease;
  }

  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--accent-dark);
    margin: 0;
  }

  .profile-tagline {
    color: var(--soft-gold);
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 10px;
  }

  .profile-grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 30px;
  }

  .side-info, .main-form {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px;
  }

  .info-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: #999;
    letter-spacing: 1px;
    margin-bottom: 15px;
    display: block;
  }

  .form-group { margin-bottom: 30px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--accent-dark); }

  .custom-input {
    width: 100%;
    border: none;
    border-bottom: 1.5px solid #e5e0d8;
    background: transparent;
    padding: 10px 0;
    font-size: 16px;
    color: var(--accent-dark);
    transition: 0.3s;
  }

  .custom-input:focus { outline: none; border-color: var(--soft-gold); }

  .social-box {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    padding: 12px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid #f0ede8;
  }

  .social-icon { width: 32px; height: 32px; background: #fcfaf7; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

  .btn-float {
    background: var(--accent-dark);
    color: #fff;
    border: none;
    padding: 14px 30px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn-float:hover { transform: translateY(-3px); }
  .btn-cancel { background: transparent; color: #888; border: 1px solid #e5e0d8; margin-right: 10px; }
</style>

<div class="profile-wrapper">
  <div class="profile-hero">
    <div class="avatar-stack">
      <div class="avatar-main" id="avatarIcon">✦</div>
    </div>
    <h1 class="profile-name" id="headerName">Profile Settings</h1>
    <div class="profile-tagline" id="profileSubtitle">InfluSync Verified Creator</div>
  </div>

  <div class="profile-grid">
    <div class="side-info">
      <span class="info-label">Connected Socials</span>
      <div class="social-box">
        <div class="social-icon">IG</div>
        <input type="text" id="instagram" class="custom-input" placeholder="@handle" disabled>
      </div>
      <div class="social-box">
        <div class="social-icon">YT</div>
        <input type="text" id="youtube" class="custom-input" placeholder="Channel" disabled>
      </div>
      <div style="margin-top: 40px;">
        <span class="info-label">Personal Site</span>
        <input type="text" id="website" class="custom-input" placeholder="yoursite.com" disabled>
      </div>
    </div>

    <div class="main-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" class="custom-input" placeholder="Your Name" disabled>
      </div>
      <div class="form-group">
        <label>Niche / Category</label>
        <input type="text" id="industry" class="custom-input" placeholder="Fashion, Tech, etc." disabled>
      </div>
      <div class="form-group">
        <label>About Me</label>
        <textarea id="bio" class="custom-input" style="min-height: 100px;" placeholder="Tell your story..." disabled></textarea>
      </div>

      <div id="btnRow" style="text-align: right; margin-top: 20px;"></div>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:12px 30px; border-radius:50px; font-size:14px; display:none; z-index:1000;"></div>

<script>
  const token = localStorage.getItem("token");
  const urlParams = new URLSearchParams(window.location.search);
  const targetUserId = urlParams.get('user_id');

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
  }

  function fillFields(data) {
    document.getElementById("name").value = data.name || "";
    document.getElementById("industry").value = data.industry || "";
    document.getElementById("website").value = data.website || "";
    document.getElementById("bio").value = data.bio || "";
    document.getElementById("instagram").value = data.instagram || "";
    document.getElementById("youtube").value = data.youtube || "";

    if (data.name) {
      document.getElementById("headerName").textContent = data.name;
      document.getElementById("avatarIcon").textContent = data.name.charAt(0).toUpperCase();
    } else {
      document.getElementById("headerName").textContent = "Profile Settings";
      document.getElementById("avatarIcon").textContent = "✦";
    }

    const btnRow = document.getElementById("btnRow");
    if (data.is_owner) {
      btnRow.innerHTML = `<button class="btn-float" onclick="enableEdit()">Edit Details</button>`;
      document.getElementById("profileSubtitle").textContent = "Your Settings";
    } else {
      btnRow.innerHTML = ``; 
      document.getElementById("profileSubtitle").textContent = "Public Profile";
    }
  }

  function loadProfile() {
    // FIX: Relative path used instead of hardcoded absolute domain address
    let apiUrl = "/api/profile/";
    if (targetUserId) apiUrl += `?user_id=${targetUserId}`;

    fetch(apiUrl, {
      headers: { "Authorization": "Bearer " + token }
    })
    .then(res => {
      if (!res.ok) throw new Error("Auth verification failed");
      return res.json();
    })
    .then(data => fillFields(data))
    .catch(err => showToast("Error loading profile. Check auth context."));
  }

  function enableEdit() {
    document.querySelectorAll(".custom-input").forEach(el => el.disabled = false);
    document.getElementById("btnRow").innerHTML = `
      <button class="btn-float btn-cancel" onclick="cancelEdit()">Cancel</button>
      <button class="btn-float" onclick="saveProfile()">Save Changes</button>
    `;
  }

  function cancelEdit() {
    document.querySelectorAll(".custom-input").forEach(el => el.disabled = true);
    loadProfile();
  }

  function saveProfile() {
    const payload = {
      name: document.getElementById("name").value,
      industry: document.getElementById("industry").value,
      website: document.getElementById("website").value,
      bio: document.getElementById("bio").value,
      instagram: document.getElementById("instagram").value,
      youtube: document.getElementById("youtube").value,
    };

    // FIX: Clean relative post route matching configuration standards
    fetch("/api/profile/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(() => {
      showToast("Profile updated!");
      cancelEdit();
    })
    .catch(() => showToast("Failed to save profile"));
  }

  loadProfile();
</script>
{% endblock %}
