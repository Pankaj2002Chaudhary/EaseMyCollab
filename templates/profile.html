{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fcfaf7;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-muted: #666666;
    --accent: #1a1a1a;
    --border: #e5e0d8;
    --input-focus: #d1cbc1;
  }

  .profile-container {
    padding: 80px 20px;
    background: var(--bg-color);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .profile-card {
    width: 100%;
    max-width: 750px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 50px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    animation: fadeIn 0.5s ease-out;
  }

  .profile-header {
    text-align: center;
    margin-bottom: 50px;
  }

  .avatar-circle {
    width: 80px;
    height: 80px;
    background: var(--text-main);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #fff;
    margin: 0 auto 20px;
    font-family: 'Playfair Display', serif;
  }

  .profile-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: var(--text-main);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .profile-subtitle {
    color: var(--text-muted);
    font-size: 15px;
    letter-spacing: 0.3px;
  }

  /* Form Layout */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
  }

  .full-width { grid-column: 1 / span 2; }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-group label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-main);
    font-weight: 600;
  }

  .form-control {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text-main);
    font-size: 14px;
    transition: all 0.2s ease;
    width: 100%;
    box-sizing: border-box;
  }

  .form-control:focus {
    outline: none;
    border-color: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.02);
  }

  .form-control:disabled {
    background: #fcfaf7;
    border-color: transparent;
    padding-left: 0;
    font-weight: 500;
    cursor: default;
    color: var(--text-main);
  }

  textarea.form-control {
    min-height: 120px;
    line-height: 1.6;
  }

  /* Buttons */
  .action-area {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    border: none;
  }

  .btn-edit {
    background: var(--text-main);
    color: #fff;
  }

  .btn-edit:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-save {
    background: #1e7e34;
    color: #fff;
  }

  .btn-cancel {
    background: #fff;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 16px 24px;
    border-radius: 12px;
    background: var(--text-main);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    z-index: 2000;
    display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }
  .toast.show { display: block; animation: slideUp 0.3s ease-out; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  @media (max-width: 650px) {
    .form-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: auto; }
    .profile-card { padding: 30px 20px; }
  }
</style>

<div class="profile-container">
  <div class="profile-card">
    
    <div class="profile-header">
      <div class="avatar-circle" id="avatarIcon">✦</div>
      <h1 class="profile-title" id="headerName">Profile</h1>
      <p class="profile-subtitle" id="profileSubtitle">Professional identity and contact details</p>
    </div>

    <div class="form-grid">
      <div class="input-group full-width">
        <label>Display Name</label>
        <input type="text" id="name" class="form-control" placeholder="Not set" disabled>
      </div>

      <div class="input-group">
        <label>Primary Niche</label>
        <input type="text" id="industry" class="form-control" placeholder="e.g. Lifestyle" disabled>
      </div>

      <div class="input-group">
        <label>Website / Portfolio</label>
        <input type="text" id="website" class="form-control" placeholder="yoursite.com" disabled>
      </div>

      <div class="input-group full-width">
        <label>About / Bio</label>
        <textarea id="bio" class="form-control" placeholder="Describe your creative journey..." disabled></textarea>
      </div>

      <div class="input-group">
        <label>Instagram Handle</label>
        <input type="text" id="instagram" class="form-control" placeholder="@username" disabled>
      </div>

      <div class="input-group">
        <label>YouTube Channel</label>
        <input type="text" id="youtube" class="form-control" placeholder="Link to channel" disabled>
      </div>
    </div>

    <div class="action-area" id="btnRow">
      </div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const token = localStorage.getItem("token");
  const urlParams = new URLSearchParams(window.location.search);
  const targetUserId = urlParams.get('user_id');

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show";
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  function fillFields(data) {
    document.getElementById("name").value = data.name || "";
    document.getElementById("industry").value = data.industry || "";
    document.getElementById("website").value = data.website || "";
    document.getElementById("bio").value = data.bio || "";
    document.getElementById("instagram").value = data.instagram || "";
    document.getElementById("youtube").value = data.youtube || "";

    if (data.name) {
      document.getElementById("headerName").textContent = data.name;
      document.getElementById("avatarIcon").textContent = data.name.charAt(0).toUpperCase();
    }

    const btnRow = document.getElementById("btnRow");
    if (data.is_owner) {
      btnRow.innerHTML = `<button class="btn btn-edit" onclick="enableEdit()">Edit Profile</button>`;
    } else {
      btnRow.innerHTML = ``; 
      document.getElementById("profileSubtitle").textContent = "Public View";
    }
  }

  function loadProfile() {
    let apiUrl = "https://easemycollab.onrender.com/api/profile/";
    if (targetUserId) apiUrl += `?user_id=${targetUserId}`;

    fetch(apiUrl, {
      headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => fillFields(data))
    .catch(err => showToast("Error loading profile"));
  }

  loadProfile();

  function enableEdit() {
    document.querySelectorAll(".form-control").forEach(el => el.disabled = false);
    document.getElementById("btnRow").innerHTML = `
      <button class="btn btn-cancel" onclick="cancelEdit()">Cancel</button>
      <button class="btn btn-save" onclick="saveProfile()">Update Profile</button>
    `;
  }

  function cancelEdit() {
    document.querySelectorAll(".form-control").forEach(el => el.disabled = true);
    loadProfile();
  }

  function saveProfile() {
    const payload = {
      name: document.getElementById("name").value,
      industry: document.getElementById("industry").value,
      website: document.getElementById("website").value,
      bio: document.getElementById("bio").value,
      instagram: document.getElementById("instagram").value,
      youtube: document.getElementById("youtube").value,
    };

    fetch("https://easemycollab.onrender.com/api/profile/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(() => {
      showToast("Profile updated successfully");
      cancelEdit();
    })
    .catch(() => showToast("Failed to save profile"));
  }
</script>
{% endblock %}
