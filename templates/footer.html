<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
  .site-footer {
    background: #fcfaf7; /* Match global bg */
    border-top: 1px solid #e5e0d8;
    padding: 80px 20px 40px;
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
  }

  .footer-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .footer-top {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    flex-wrap: wrap;
    margin-bottom: 60px;
  }

  .footer-brand {
    flex: 1;
    min-width: 250px;
  }

  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
    text-decoration: none;
    display: inline-block;
  }

  .footer-logo span {
    font-style: italic;
    font-weight: 400;
  }

  .footer-tagline {
    font-size: 14px;
    color: #666666;
    line-height: 1.6;
    max-width: 280px;
  }

  .footer-links-wrap {
    display: flex;
    gap: 80px;
    flex-wrap: wrap;
  }

  .footer-col-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a1a1a;
    margin-bottom: 20px;
  }

  .footer-link {
    display: block;
    font-size: 14px;
    color: #666666;
    text-decoration: none;
    margin-bottom: 12px;
    transition: 0.2s;
  }

  .footer-link:hover {
    color: #1a1a1a;
    transform: translateX(3px);
  }

  .footer-bottom {
    padding-top: 30px;
    border-top: 1px solid #e5e0d8;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
  }

  .footer-copy {
    font-size: 13px;
    color: #888888;
  }

  .footer-credit {
    font-size: 13px;
    color: #888888;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 4px;
    height: 4px;
    background: #d1cbc1;
    border-radius: 50%;
  }

  @media (max-width: 600px) {
    .site-footer { padding: 60px 20px 30px; }
    .footer-links-wrap { gap: 40px; }
    .footer-bottom { flex-direction: column; align-items: flex-start; }
  }
</style>

<footer class="site-footer">
  <div class="footer-inner">

    <div class="footer-top">
      <div class="footer-brand">
        <a href="/" class="footer-logo">Ease<span>My</span>Collab</a>
        <p class="footer-tagline">
          The curated marketplace connecting high-impact creators with visionary brands.
        </p>
      </div>

      <div class="footer-links-wrap">
        <div class="footer-col">
          <h4 class="footer-col-title">Navigation</h4>
          <a href="/dashboard/" class="footer-link">Dashboard</a>
          <a href="/create-campaign/" class="footer-link">Launch Campaign</a>
          <a href="/profile/" class="footer-link">Creator Profile</a>
        </div>
        
        <div class="footer-col">
          <h4 class="footer-col-title">Legal</h4>
          <a href="#" class="footer-link">Privacy Policy</a>
          <a href="#" class="footer-link">Terms of Service</a>
          <a href="#" class="footer-link">Contact Support</a>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <div class="footer-copy">
        © 2026 EaseMyCollab. Dedicated to the creator economy.
      </div>
      <div class="footer-credit">
        Based in India <span class="dot"></span> Designed for Global
      </div>
    </div>

  </div>
