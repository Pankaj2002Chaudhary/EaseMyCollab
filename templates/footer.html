<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  .site-footer {
    background: #0d0d0f;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 48px 40px 28px;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .site-footer::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
  }

  .footer-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .footer-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 40px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .footer-brand {}

  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #f0ece4;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }

  .footer-logo span { color: #c9a96e; }

  .footer-tagline {
    font-size: 12px;
    color: #6b6870;
    line-height: 1.6;
    max-width: 220px;
  }

  .footer-links {
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
  }

  .footer-col {}

  .footer-col-title {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #c9a96e;
    font-weight: 500;
    margin-bottom: 14px;
  }

  .footer-col a {
    display: block;
    font-size: 13px;
    color: #6b6870;
    text-decoration: none;
    margin-bottom: 9px;
    transition: color 0.2s ease;
  }

  .footer-col a:hover { color: #f0ece4; }

  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-copy {
    font-size: 12px;
    color: #6b6870;
  }

  .footer-copy span { color: #c9a96e; }

  .footer-heart {
    font-size: 12px;
    color: #6b6870;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .footer-heart::before {
    content: '♥';
    color: #c9a96e;
    font-size: 11px;
  }

  @media (max-width: 600px) {
    .site-footer { padding: 36px 20px 20px; }
    .footer-top { flex-direction: column; gap: 28px; }
    .footer-links { gap: 32px; }
    .footer-bottom { flex-direction: column; align-items: flex-start; }
  }
</style>

<footer class="site-footer">
  <div class="footer-inner">

    <div class="footer-top">
      <div class="footer-brand">
        <div class="footer-logo">Ease<span>My</span>Collab</div>
        <div class="footer-tagline">Connecting brands with the right voices. Campaigns that convert.</div>
      </div>

      <div class="footer-links">
        <div class="footer-col">
          <div class="footer-col-title">Platform</div>
          <a href="/dashboard/">Dashboard</a>
          <a href="/create-campaign/">Create Campaign</a>
          <a href="/profile/">My Profile</a>
        </div>
        <div class="footer-col">
          <div class="footer-col-title">Company</div>
          <a href="#">About</a>
          <a href="#">Contact</a>
          <a href="#">Privacy Policy</a>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <div class="footer-copy">© 2026 <span>EaseMyCollab</span>. All rights reserved.</div>
      <div class="footer-heart">Built with care in India</div>
    </div>

  </div>
