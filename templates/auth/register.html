{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fcfaf7;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-muted: #666666;
    --accent: #1a1a1a;
    --border: #e5e0d8;
    --error: #d93025;
  }

  body {
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    margin: 0;
  }

  .main-container {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: var(--card-bg);
    width: 100%;
    max-width: 400px;
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03);
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
  .header p { color: var(--text-muted); font-size: 14px; }

  .role-select {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    background: #f5f2ed;
    padding: 4px;
    border-radius: 8px;
  }

  .role-select label {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
    color: var(--text-muted);
  }

  .role-select input { display: none; }
  .role-select input:checked + label {
    background: var(--card-bg);
    color: var(--text-main);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .input-field {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    transition: 0.2s;
    box-sizing: border-box;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--text-main);
    background: #fff;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .footer-text a { color: var(--text-main); font-weight: 600; text-decoration: none; }

  .msg-box {
    font-size: 13px;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    display: none;
    text-align: center;
  }
  .error-box { background: #fdf2f2; color: var(--error); border: 1px solid #f9d6d6; }
  
  #otpStep { display: none; } /* Hidden initially */
</style>

<div class="main-container">
  <div class="auth-card">
    <div class="header">
      <h1>EaseMyCollab</h1>
      <p id="headerDesc">Create your professional account</p>
    </div>

    <div id="statusMsg" class="msg-box"></div>

    <div id="detailsStep">
      <div class="role-select">
        <input type="radio" name="role" id="influencer" value="influencer" checked>
        <label for="influencer">Influencer</label>
        
        <input type="radio" name="role" id="brand" value="brand">
        <label for="brand">Brand</label>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="input-field" placeholder="pankaj_ducs">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="input-field" placeholder="name@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••">
      </div>

      <button id="submitBtn" class="btn-primary" onclick="handleRegister()">Create Account</button>
    </div>

    <div id="otpStep">
      <div class="form-group">
        <label>Enter Email OTP</label>
        <input type="text" id="emailOtp" class="input-field" placeholder="000000" maxlength="6">
      </div>
      <button id="verifyBtn" class="btn-primary" onclick="handleVerifyOTP()">Verify & Activate</button>
    </div>

    <div class="footer-text">
      Already have an account? <a href="/login/">Sign in</a>
    </div>
  </div>
</div>

<script>
  // Step 1: Submit Details and Request Mail OTP
  async function handleRegister() {
    const btn = document.getElementById('submitBtn');
    const msgBox = document.getElementById('statusMsg');
    
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.querySelector('input[name="role"]:checked').value;

    if(!username || !email || !password) {
      showError("Please fill all fields");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Processing...";
    msgBox.style.display = "none";

    try {
      const response = await fetch("/api/register/send-otp/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password, role })
      });

      const data = await response.json();

      if (response.ok) {
        // Toggle view blocks smoothly
        document.getElementById('detailsStep').style.display = 'none';
        document.getElementById('otpStep').style.display = 'block';
        document.getElementById('headerDesc').innerText = "Verify your email identity";
        
        msgBox.className = "msg-box";
        msgBox.style.backgroundColor = "#f0fdf4";
        msgBox.style.color = "#166534";
        msgBox.style.border = "1px solid #bbf7d0";
        msgBox.innerText = data.message || "OTP Sent! Check your email.";
        msgBox.style.display = "block";
      } else {
        showError(data.error || "Something went wrong");
        btn.disabled = false;
        btn.innerText = "Create Account";
      }
    } catch (err) {
      showError("Server connection failed. Try again.");
      btn.disabled = false;
      btn.innerText = "Create Account";
    }
  }

  // Step 2: Validate the user token to register user instance inside backend DB
  async function handleVerifyOTP() {
    const btn = document.getElementById('verifyBtn');
    const msgBox = document.getElementById('statusMsg');
    const email = document.getElementById('email').value.trim();
    const otp = document.getElementById('emailOtp').value.trim();

    if(!otp) {
      showError("Please enter the verification OTP code");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Activating...";

    try {
      const response = await fetch("/api/register/verify-otp/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp })
      });

      const data = await response.json();

      if(response.ok) {
        msgBox.className = "msg-box";
        msgBox.style.backgroundColor = "#f0fdf4";
        msgBox.style.color = "#166534";
        msgBox.style.border = "1px solid #bbf7d0";
        msgBox.innerText = "Verification successful! Redirecting...";
        msgBox.style.display = "block";
        setTimeout(() => window.location.href = "/login/", 1500);
      } else {
        showError(data.error || "Invalid OTP code entered.");
        btn.disabled = false;
        btn.innerText = "Verify & Activate";
      }
    } catch(err) {
      showError("Verification request encountered an error.");
      btn.disabled = false;
      btn.innerText = "Verify & Activate";
    }
  }

  function showError(msg) {
    const msgBox = document.getElementById('statusMsg');
    msgBox.className = "msg-box error-box";
    msgBox.innerText = msg;
    msgBox.style.display = "block";
  }
</script>
{% endblock %}
