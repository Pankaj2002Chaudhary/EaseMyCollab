{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: rgba(255,255,255,0.07);
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #f0ece4;
    --muted: #6b6870;
    --error: #f87171;
    --success: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

  .register-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,169,110,0.1) 0%, transparent 55%), var(--bg);
  }

  .register-card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    position: relative;
    animation: fadeUp 0.5s ease both;
  }

  .card-header-block { text-align: center; margin-bottom: 32px; }
  .logo-mark {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #8b6914);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
    color: #0d0d0f; margin: 0 auto 16px;
  }

  .card-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text); }
  .card-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .role-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; margin-top: 20px; }
  .role-option { position: relative; }
  .role-option input { position: absolute; opacity: 0; }
  .role-label {
    display: flex; flex-direction: column; align-items: center; padding: 16px;
    border-radius: 12px; border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; transition: all 0.2s; font-size: 13px; color: var(--muted);
  }
  .role-option input:checked + .role-label {
    background: rgba(201,169,110,0.1); border-color: var(--accent); color: var(--accent2);
  }

  .field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .field-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; color: var(--text); font-size: 14px; width: 100%; transition: 0.2s;
  }
  .field-input:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.02); }

  .btn-register {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), #a8812e);
    color: #0d0d0f; font-weight: 700; font-size: 15px; cursor: pointer;
    transition: 0.3s; margin-top: 10px;
  }
  .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,169,110,0.3); }
  .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

  .global-err {
    font-size: 12px; color: var(--error); text-align: center;
    padding: 12px; background: rgba(248,113,113,0.1);
    border-radius: 8px; margin-bottom: 16px; display: none;
  }

  .login-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
  .login-link a { color: var(--accent2); text-decoration: none; font-weight: 600; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="register-wrap">
  <div class="register-card">
    <div class="card-header-block">
      <div class="logo-mark">E</div>
      <h1 class="card-title">Create account</h1>
      <p class="card-sub">Start your collaboration journey</p>
    </div>

    <div class="global-err" id="globalErr"></div>

    <div class="role-toggle">
      <div class="role-option">
        <input type="radio" name="role" id="roleInfluencer" value="influencer" checked>
        <label class="role-label" for="roleInfluencer">
          <span>🎯 Influencer</span>
        </label>
      </div>
      <div class="role-option">
        <input type="radio" name="role" id="roleBrand" value="brand">
        <label class="role-label" for="roleBrand">
          <span>🏢 Brand</span>
        </label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Username</label>
      <input type="text" id="username" class="field-input" placeholder="Choose a unique name">
    </div>

    <div class="field-group">
      <label class="field-label">Email Address</label>
      <input type="email" id="email" class="field-input" placeholder="name@example.com">
    </div>

    <div class="field-group">
      <label class="field-label">Password</label>
      <input type="password" id="password" class="field-input" placeholder="Min. 6 characters">
    </div>

    <button class="btn-register" id="registerBtn" onclick="register()">
      <span id="btnLabel">Create Account ✦</span>
    </button>

    <div class="login-link">
      Already have an account? <a href="/login/">Sign in</a>
    </div>
  </div>
</div>

<script>
  function register() {
    const btn = document.getElementById("registerBtn");
    const label = document.getElementById("btnLabel");
    const globalErr = document.getElementById("globalErr");
    
    const role = document.querySelector('input[name="role"]:checked').value;
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !email || !password) {
      globalErr.textContent = "All fields are required!";
      globalErr.style.display = "block";
      return;
    }

    btn.disabled = true;
    label.textContent = "Processing...";
    globalErr.style.display = "none";

    fetch("https://easemycollab.onrender.com/api/register/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password, role })
    })
    .then(async res => {
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || data.detail || "Registration failed");
        return data;
    })
    .then(() => {
        label.textContent = "✓ Success! Redirecting...";
        btn.style.background = "var(--success)";
        setTimeout(() => window.location.href = "/login/", 1500);
    })
    .catch(err => {
        btn.disabled = false;
        label.textContent = "Create Account ✦";
        globalErr.textContent = err.message;
        globalErr.style.display = "block";
    });
  }
</script>
{% endblock %}
