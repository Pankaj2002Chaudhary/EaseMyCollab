{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fcfaf7;       /* Soft Beige/Off-white */
    --card-bg: #ffffff;
    --text-main: #1a1a1a;     /* Deep Black */
    --text-muted: #666666;
    --accent: #1a1a1a;        /* Solid Black for buttons */
    --border: #e5e0d8;        /* Subtle beige border */
    --error: #d93025;
  }

  body {
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    margin: 0;
  }

  .main-container {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: var(--card-bg);
    width: 100%;
    max-width: 400px;
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03);
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
  .header p { color: var(--text-muted); font-size: 14px; }

  /* Minimal Role Selector */
  .role-select {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    background: #f5f2ed;
    padding: 4px;
    border-radius: 8px;
  }

  .role-select label {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
    color: var(--text-muted);
  }

  .role-select input { display: none; }
  .role-select input:checked + label {
    background: var(--card-bg);
    color: var(--text-main);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  /* Form Elements */
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .input-field {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    transition: 0.2s;
    box-sizing: border-box;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--text-main);
    background: #fff;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .footer-text a { color: var(--text-main); font-weight: 600; text-decoration: none; }

  .msg-box {
    font-size: 13px;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    display: none;
    text-align: center;
  }
  .error-box { background: #fdf2f2; color: var(--error); border: 1px solid #f9d6d6; }
</style>

<div class="main-container">
  <div class="auth-card">
    <div class="header">
      <h1>EaseMyCollab</h1>
      <p>Create your professional account</p>
    </div>

    <div id="statusMsg" class="msg-box"></div>

    <div class="role-select">
      <input type="radio" name="role" id="influencer" value="influencer" checked>
      <label for="influencer">Influencer</label>
      
      <input type="radio" name="role" id="brand" value="brand">
      <label for="brand">Brand</label>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" class="input-field" placeholder="pankaj_ducs">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" class="input-field" placeholder="name@example.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="input-field" placeholder="••••••••">
    </div>

    <button id="submitBtn" class="btn-primary" onclick="handleRegister()">Create Account</button>

    <div class="footer-text">
      Already have an account? <a href="/login/">Sign in</a>
    </div>
  </div>
</div>

<script>
  async function handleRegister() {
    const btn = document.getElementById('submitBtn');
    const msgBox = document.getElementById('statusMsg');
    
    // Get values
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.querySelector('input[name="role"]:checked').value;

    // Basic validation
    if(!username || !email || !password) {
      showError("Please fill all fields");
      return;
    }

    // UI State
    btn.disabled = true;
    btn.innerText = "Processing...";
    msgBox.style.display = "none";

    try {
      const response = await fetch("https://easemycollab.onrender.com/api/register/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password, role })
      });

      const data = await response.json();

      if (response.ok) {
        msgBox.className = "msg-box" ; // Success style would go here
        msgBox.style.backgroundColor = "#f0fdf4";
        msgBox.style.color = "#166534";
        msgBox.style.border = "1px solid #bbf7d0";
        msgBox.innerText = "Registration successful! Redirecting...";
        msgBox.style.display = "block";
        setTimeout(() => window.location.href = "/login/", 1500);
      } else {
        showError(data.error || "Something went wrong");
        btn.disabled = false;
        btn.innerText = "Create Account";
      }
    } catch (err) {
      showError("Server connection failed. Try again.");
      btn.disabled = false;
      btn.innerText = "Create Account";
    }
  }

  function showError(msg) {
    const msgBox = document.getElementById('statusMsg');
    msgBox.className = "msg-box error-box";
    msgBox.innerText = msg;
    msgBox.style.display = "block";
  }
</script>
{% endblock %}
