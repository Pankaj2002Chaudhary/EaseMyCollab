{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fcfaf7;       /* Soft Beige/Off-white */
    --card-bg: #ffffff;
    --text-main: #1a1a1a;     /* Deep Black */
    --text-muted: #666666;
    --accent: #1a1a1a;        /* Solid Black */
    --border: #e5e0d8;        /* Subtle border */
    --error: #d93025;
  }

  body {
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    margin: 0;
  }

  .main-container {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: var(--card-bg);
    width: 100%;
    max-width: 400px;
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03);
    animation: fadeIn 0.4s ease-out;
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
  .header p { color: var(--text-muted); font-size: 14px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .input-field {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    transition: 0.2s;
    box-sizing: border-box;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--text-main);
    background: #fff;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .footer-text a { color: var(--text-main); font-weight: 600; text-decoration: none; }

  .msg-box {
    font-size: 13px;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    display: none;
    text-align: center;
    background: #fdf2f2;
    color: var(--error);
    border: 1px solid #f9d6d6;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="main-container">
  <div class="auth-card">
    <div class="header">
      <h1>EaseMyCollab</h1>
      <p>Welcome back, please sign in</p>
    </div>

    <div id="errorBox" class="msg-box"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" class="input-field" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="input-field" placeholder="••••••••">
    </div>

    <button id="loginBtn" class="btn-primary" onclick="handleLogin()">Sign In</button>

    <div class="footer-text" style="margin-top: 16px;">
  <a href="/forgot-password/" style="font-weight: 400; font-size: 12px; color: var(--text-muted);">Forgot Password?</a>
</div>

    <div class="footer-text">
      New here? <a href="/register/">Create an account</a>
    </div>
  </div>
</div>

<script>
  // Enter key submission handler support
  document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });

  async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if(!username || !password) {
      showError("Please enter both fields");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Signing in...";
    errorBox.style.display = "none";

    try {
      // FIX: Changed hardcoded domain to relative environment matching endpoints mapping path route
      const response = await fetch("/api/login/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (response.ok) {
        localStorage.setItem("token", data.access);
        
        // Defensive role identity tracking execution parameter mapping
        const userRole = data.user && data.user.role ? data.user.role : "influencer";
        localStorage.setItem("role", userRole);
        
        btn.style.background = "#166534";
        btn.innerText = "✓ Success";
        
        // Dynamic redirection block engine management
        setTimeout(() => {
          if (userRole === "brand") {
            window.location.href = "/dashboard/";
          } else {
            window.location.href = "/";
          }
        }, 800);
      } else {
        showError(data.detail || "Invalid credentials");
        btn.disabled = false;
        btn.innerText = "Sign In";
      }
    } catch (err) {
      showError("Connection failed. Please try again.");
      btn.disabled = false;
      btn.innerText = "Sign In";
    }
  }

  function showError(msg) {
    const errorBox = document.getElementById('errorBox');
    errorBox.innerText = msg;
    errorBox.style.display = "block";
  }
</script>
{% endblock %}
