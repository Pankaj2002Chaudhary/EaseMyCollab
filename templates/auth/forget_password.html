{% extends 'base.html' %}
{% block content %}
<style>
    /* Aapka purana registration wala CSS yahan copy kar sakte hain */
    .forgot-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #resetFields { display: none; } /* Shuru mein hidden */
</style>

<div class="forgot-wrap">
    <div class="register-card" id="forgotCard" style="max-width: 400px;">
        <div class="card-header-block">
            <div class="card-title">Reset Password</div>
            <div class="card-sub">Enter email to get OTP</div>
        </div>

        <div class="global-err" id="globalErr"></div>

        <div id="emailStep">
            <div class="field-group">
                <label class="field-label">Registered Email</label>
                <input type="email" id="resetEmail" class="field-input" placeholder="your@email.com">
            </div>
            <button class="btn-register" onclick="sendResetOTP()" id="otpBtn">
                <span class="btn-text">Send Reset OTP</span>
            </button>
        </div>

        <div id="resetFields">
            <div class="field-group">
                <label class="field-label">OTP</label>
                <input type="text" id="resetOtp" class="field-input" placeholder="000000">
            </div>
            <div class="field-group">
                <label class="field-label">New Password</label>
                <input type="password" id="newPassword" class="field-input" placeholder="Min 6 chars">
            </div>
            <button class="btn-register" onclick="finalizeReset()" id="resetBtn">
                <span class="btn-text">Update Password ✦</span>
            </button>
        </div>
    </div>
</div>

<script>
    async function sendResetOTP() {
        const email = document.getElementById('resetEmail').value;
        const btn = document.getElementById('otpBtn');
        btn.classList.add('loading');

        const res = await fetch("/api/forgot-password/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email })
        });
        
        if (res.ok) {
            document.getElementById('emailStep').style.display = 'none';
            document.getElementById('resetFields').style.display = 'block';
        } else {
            const data = await res.json();
            alert(data.error);
        }
        btn.classList.remove('loading');
    }

    async function finalizeReset() {
        const email = document.getElementById('resetEmail').value;
        const otp = document.getElementById('resetOtp').value;
        const new_password = document.getElementById('newPassword').value;

        const res = await fetch("/api/reset-password/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, otp, new_password })
        });

        if (res.ok) {
            alert("Password change ho gaya! Login karein.");
            window.location.href = "/login/";
        } else {
            const data = await res.json();
            alert(data.error);
        }
    }
</script>
{% endblock %}
