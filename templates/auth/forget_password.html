{% extends 'base.html' %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fcfaf7;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-muted: #666666;
    --accent: #1a1a1a;
    --border: #e5e0d8;
    --error: #d93025;
  }

  body {
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    margin: 0;
  }

  .forgot-wrap { 
    min-height: 90vh; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    padding: 20px; 
  }

  .register-card {
    background: var(--card-bg);
    width: 100%;
    max-width: 400px;
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03);
  }

  .card-header-block { text-align: center; margin-bottom: 32px; }
  .card-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
  .card-sub { color: var(--text-muted); font-size: 14px; }

  .field-group { margin-bottom: 20px; }
  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .input-field {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    transition: 0.2s;
    box-sizing: border-box;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--text-main);
    background: #fff;
  }

  .btn-register {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
  }

  .btn-register:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-register:disabled { background: #ccc; cursor: not-allowed; }

  .global-err {
    font-size: 13px;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    display: none;
    text-align: center;
    background: #fdf2f2;
    color: var(--error);
    border: 1px solid #f9d6d6;
  }

  #resetFields { display: none; } /* Shuru mein hidden */
</style>

<div class="forgot-wrap">
  <div class="register-card" id="forgotCard">
    <div class="card-header-block">
      <div class="card-title">Reset Password</div>
      <div class="card-sub" id="forgotDesc">Enter email to get OTP</div>
    </div>

    <div class="global-err" id="globalErr"></div>

    <div id="emailStep">
      <div class="field-group">
        <label class="field-label">Registered Email</label>
        <input type="email" id="resetEmail" class="input-field" placeholder="your@email.com">
      </div>
      <button class="btn-register" onclick="sendResetOTP()" id="otpBtn">
        <span class="btn-text">Send Reset OTP</span>
      </button>
    </div>

    <div id="resetFields">
      <div class="field-group">
        <label class="field-label">OTP Code</label>
        <input type="text" id="resetOtp" class="input-field" placeholder="000000">
      </div>
      <div class="field-group">
        <label class="field-label">New Password</label>
        <input type="password" id="newPassword" class="input-field" placeholder="Min 6 chars">
      </div>
      <button class="btn-register" onclick="finalizeReset()" id="resetBtn">
        <span class="btn-text">Update Password ✦</span>
      </button>
    </div>
  </div>
</div>

<script>
  function showError(msg) {
    const errBox = document.getElementById('globalErr');
    errBox.innerText = msg;
    errBox.style.display = "block";
  }

  async function sendResetOTP() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn = document.getElementById('otpBtn');
    const errBox = document.getElementById('globalErr');
    
    if(!email) {
      showError("Please enter your registered email address.");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Sending code...";
    errBox.style.display = "none";

    try {
      const res = await fetch("/api/forgot-password/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
      });
      
      const data = await res.json();

      if (res.ok) {
        document.getElementById('emailStep').style.display = 'none';
        document.getElementById('resetFields').style.display = 'block';
        document.getElementById('forgotDesc').innerText = "Enter the verification codes sent";
      } else {
        showError(data.error || "Failed to process request.");
        btn.disabled = false;
        btn.innerText = "Send Reset OTP";
      }
    } catch(err) {
      showError("Network connection dropped.");
      btn.disabled = false;
      btn.innerText = "Send Reset OTP";
    }
  }

  async function finalizeReset() {
    const email = document.getElementById('resetEmail').value.trim();
    const otp = document.getElementById('resetOtp').value.trim();
    const new_password = document.getElementById('newPassword').value;
    const btn = document.getElementById('resetBtn');

    if(!otp || !new_password) {
      showError("All verification parameters are mandatory.");
      return;
    }

    btn.disabled = true;
    btn.innerText = "Updating values...";

    try {
      const res = await fetch("/api/reset-password/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, otp, new_password })
      });

      if (res.ok) {
        alert("Password change ho gaya! Login karein.");
        window.location.href = "/login/";
      } else {
        const data = await res.json();
        showError(data.error || "Token compilation execution failure.");
        btn.disabled = false;
        btn.innerText = "Update Password ✦";
      }
    } catch(err) {
      showError("Failed to make target update connections.");
      btn.disabled = false;
      btn.innerText = "Update Password ✦";
    }
  }
</script>
{% endblock %}
