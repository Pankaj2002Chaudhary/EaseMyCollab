{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fcfaf7;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-muted: #666666;
    --accent: #1a1a1a;
    --border: #e5e0d8;
    --success: #166534;
    --danger: #991b1b;
  }

  body {
    background-color: var(--bg-color);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    margin: 0;
  }

  .dashboard-wrap {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
  }

  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .dash-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    margin: 0;
  }

  .btn-create {
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: 0.2s;
  }

  .btn-create:hover { opacity: 0.9; transform: translateY(-1px); }

  .campaign-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }

  .campaign-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 28px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
  }

  .campaign-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
    border-color: #d1cbc1;
  }

  .campaign-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; }

  .campaign-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .applicant-item {
    padding: 14px;
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    animation: fadeIn 0.3s ease;
  }

  .status-tag {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    border-radius: 4px;
    background: #eee;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="dashboard-wrap">
  <div class="dash-header">
    <h1 class="dash-title">Brand Dashboard</h1>
    <a href="/create-campaign/" class="btn-create">+ New Campaign</a>
  </div>

  <div class="campaign-grid" id="campaign-container">
    <p style="color: var(--text-muted)">Loading your workspace...</p>
  </div>
</div>

<script>
let openedCampaign = null;
const token = localStorage.getItem("token");

async function updateStatus(appId, newStatus, event) {
    if (event) event.stopPropagation();
    try {
        const res = await fetch(`https://easemycollab.onrender.com/api/application/${appId}/update/`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) { location.reload(); }
    } catch (err) { console.error(err); }
}

async function toggleApplicants(campaignId) {
    const section = document.getElementById(`applicants-${campaignId}`);
    if (openedCampaign === campaignId) { section.innerHTML = ""; openedCampaign = null; return; }
    
    openedCampaign = campaignId;
    section.innerHTML = "<p style='font-size:12px; color:var(--text-muted)'>Fetching...</p>";

    try {
        const res = await fetch(`https://easemycollab.onrender.com/api/applicants/${campaignId}/`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const apps = await res.json();
        section.innerHTML = apps.length === 0 ? "<p style='font-size:12px; color:var(--text-muted)'>No pending applications</p>" : "";

        apps.forEach(app => {
            const div = document.createElement("div");
            div.className = "applicant-item";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:500;">👤 ${app.influencer_name}</span>
                    <div>
                        ${app.status === 'pending' ? `
                            <button onclick="updateStatus(${app.id}, 'accepted', event)" style="background:#166534; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px; margin-right:5px;">Accept</button>
                            <button onclick="updateStatus(${app.id}, 'rejected', event)" style="background:#991b1b; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px;">Reject</button>
                        ` : `
                            <span class="status-tag">${app.status}</span>
                        `}
                    </div>
                </div>
            `;
            section.appendChild(div);
        });
    } catch (err) { section.innerHTML = "Error loading data."; }
}

document.addEventListener("DOMContentLoaded", function() {
    const container = document.getElementById("campaign-container");
    async function loadCampaigns() {
        try {
            const response = await fetch("https://easemycollab.onrender.com/api/my-campaigns/", {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await response.json();
            container.innerHTML = "";
            data.sort((a, b) => b.id - a.id).forEach(c => {
                const card = document.createElement("div");
                card.className = "campaign-card";
                card.innerHTML = `
                    <div class="campaign-title">${c.title}</div>
                    <div class="campaign-desc">${c.description || "Active collaboration campaign."}</div>
                    <div id="applicants-${c.id}" style="margin-top:15px;"></div>
                `;
                card.onclick = () => toggleApplicants(c.id);
                container.appendChild(card);
            });
        } catch (e) { container.innerHTML = "Failed to load campaigns."; }
    }
    loadCampaigns();
});
</script>
{% endblock %}
